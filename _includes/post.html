<article class="post" itemscope itemtype="https://schema.org/CreativeWork">
  <header class="post-header">
    <h1 class="post-title p-name" itemprop="headline">{{ page.title | escape }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: site.data.date_format.post }}
      </time>
    </div>
    {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <a class="tag" href="{{ '/tags' | relative_url }}#{{ tag }}">{{ tag }}</a>
      {% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content" itemprop="articleBody">
    {{ content }}
  </div>
  <footer class="post-copyright">
    <p>This post is licensed under <a href="https://creativecommons.org/licenses/by/4.0/" rel="external nofollow noopener" target="_blank">CC BY 4.0</a> by the author.</p>
  </footer>
</article>
